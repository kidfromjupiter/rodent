name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            libsystemd-dev \
            libbluetooth-dev \
            python3
      
      - name: Build and install sdbus-c++
        run: |
          git clone https://github.com/Kistler-Group/sdbus-cpp.git
          cd sdbus-cpp
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build .
          sudo cmake --build . --target install
      
      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
      
      - name: Build
        run: |
          cd build
          make -j$(nproc)
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/rodent
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
